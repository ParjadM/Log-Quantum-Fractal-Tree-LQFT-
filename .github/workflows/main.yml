name: LQFT CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install setuptools wheel psutil

    - name: Compile C-Engine
      run: |
        python setup.py build_ext --inplace

    - name: Run Logical Smoke Test
      run: |
        # Keep CI focused on package correctness.
        # Heavy benchmarks remain local-only and the old pytest file was removed during package cleanup.
        python - <<'PY'
        import lqft_engine

        engine = lqft_engine.LQFT()
        engine.insert("alpha", "value-a")
        engine.insert("beta", "value-b")

        assert engine.search("alpha") == "value-a"
        assert engine.contains("beta") is True

        engine.remove("alpha")
        assert engine.search("alpha") is None

        stats = engine.get_stats()
        assert isinstance(stats, dict)
        assert "physical_nodes" in stats

        print("logical smoke test passed")
        PY