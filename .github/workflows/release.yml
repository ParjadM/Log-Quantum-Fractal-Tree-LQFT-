name: Build and Upload to PyPI

on:
  push:
    tags:
      - 'v*' # Trigger only on version tags (e.g., v0.1.1)

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14 for wheel smoke test
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.16.5

      - name: Smoke test built cp314 wheel
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python - <<'PY'
          import glob
          import os
          import subprocess
          import sys

          matches = sorted(glob.glob("wheelhouse/*cp314*.whl"))
          if not matches:
            available = sorted(glob.glob("wheelhouse/*.whl"))
            listing = "\n".join(available) if available else "<no wheels found in wheelhouse>"
            raise SystemExit(
              "Expected a cp314 wheel in wheelhouse, but none was found. Available wheels:\n"
              + listing
            )

          wheel_path = matches[0]
          print(f"Installing smoke-test wheel: {wheel_path}")
          subprocess.check_call([sys.executable, "-m", "pip", "install", wheel_path])
          PY
          python -c "import lqft_engine; engine = lqft_engine.LQFT(); print(type(engine).__name__)"

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ github.sha }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist-${{ github.sha }}
          path: dist/*.tar.gz

  upload_pypi:
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}